<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>図書館一覧</title>
    </head>
    
    <body>
   
        
        <h1>図書館一覧</h1>
        <ul>
            {% for data in libs["data"] %}
                <li>
                    <p>{{ data.formal }}<br>
                    システムID: {{ data.systemid }}</p>
                    <button class="idcopy" onclick="copyToClipboard('{{ data.systemid }}')">システムIDをコピー</button>
                </li>
            {% endfor %}
        </ul>

        <script>
            function copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(function() {
                    alert("コピーしました: " + text);
                });
            }
        </script>
    </body>
   
        

       



</html>
